<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Cartify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">Cartify</a>
        <nav>
            <a href="about.html">About</a>
            <a href="index.html">Shop</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main>
        <section>
            <h2 class="section-title">Get in Touch</h2>
            <div class="contact-container">
                <p style="text-align: center; margin-bottom: 1.5rem;">Have questions or want to make a bulk order for your club event? Drop us a message!</p>
                <form>
                    <input type="text" placeholder="First Name" required>
                    <input type="text" placeholder="Last Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="tel" placeholder="Phone Number" required>
                    <textarea rows="5" placeholder="Your Message" required></textarea>
                    <button type="submit" class="btn" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Cartify | Universiti Utara Malaysia (UUM)</p>
    </footer>

</body>
</html>
